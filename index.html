<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طقوس الحظ | ديوان شعر - رشيد الصويلحي</title>
    <meta name="description" content="طقوس الحظ - ديوان شعر للشاعر المغربي رشيد الصويلحي.">

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Arabic:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary:#0d0d1a;
            --secondary:#1a1a2e;
            --accent:#c9a227;
            --text:#f0ece3;
            --muted:#9a9a9a;
            --font-ar:'IBM Plex Arabic',sans-serif;
            --font-display:'Aref Ruqaa',serif;
        }

        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:var(--font-ar);
            background:var(--primary);
            color:var(--text);
        }

        nav{
            position:fixed;
            width:100%;
            top:0;
            padding:1rem 5%;
            display:flex;
            justify-content:space-between;
            background:rgba(13,13,26,0.9);
            z-index:1000;
        }

        .logo{
            color:var(--accent);
            text-decoration:none;
            font-family:var(--font-display);
        }

        .hero{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:2rem;
        }

        .hero-title{
            font-size:4rem;
            color:var(--accent);
            font-family:var(--font-display);
        }

        .hero-subtitle{
            color:var(--muted);
            margin-top:1rem;
        }

        /* 📌 صورة الديوان */
        .hero-book{
            margin-top:2rem;
        }

        .diwan-cover{
            width:280px;
            max-width:90%;
            border-radius:15px;
            box-shadow:0 25px 70px rgba(0,0,0,0.6);
            transition:0.4s;
        }

        .diwan-cover:hover{
            transform:scale(1.05);
        }

        section{
            padding:80px 5%;
        }

        .section-title{
            text-align:center;
            color:var(--accent);
            margin-bottom:2rem;
            font-size:2rem;
        }

        .about{
            background:var(--secondary);
        }

        .content{
            max-width:900px;
            margin:auto;
            color:var(--muted);
            line-height:1.9;
        }

        footer{
            text-align:center;
            padding:2rem;
            border-top:1px solid rgba(255,255,255,0.1);
            color:var(--muted);
        }
    </style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="#" class="logo">طقوس الحظ</a>
</nav>

<!-- HERO -->
<section class="hero">

    <h1 class="hero-title">طقوس الحظ</h1>
    <p class="hero-subtitle">ديوان شعر - رشيد الصويلحي</p>

    <!-- 📌 الصورة (مهم) -->
    <div class="hero-book">
        <img src="/diwan.jpeg" class="diwan-cover" alt="غلاف الديوان">
    </div>

</section>

<!-- ABOUT -->
<section class="about">
    <h2 class="section-title">عن الديوان</h2>

    <div class="content">
        طقوس الحظ هو ديوان شعري يعكس تجربة إنسانية عميقة،
        حيث تتحول اللغة إلى رحلة داخل الذات، بين الألم والمعنى،
        وبين الواقع والخيال.
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2026 طقوس الحظ - جميع الحقوق محفوظة
</footer>

</body>
</html>
